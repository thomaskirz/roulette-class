<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Schüler</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #ecf0f1; padding: 20px; }
        .screen { display: none; }
        .active { display: block; }
        input[type="text"], input[type="number"] { padding: 10px; font-size: 18px; width: 80%; margin-bottom: 20px; }
        button { padding: 15px; font-size: 18px; width: 80%; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; }
        .btn-red { background-color: #e74c3c; }
        .btn-black { background-color: #2c3e50; }
        .btn-even, .btn-odd { background-color: #3498db; }
        .btn-num { background-color: #f39c12; }
        #result-box { font-size: 40px; margin: 20px; font-weight: bold; }
    </style>
</head>
<body>
    
    <div id="login-screen" class="screen active">
        <h2>Wie heißt du?</h2>
        <input type="text" id="student-name" placeholder="Dein Name">
        <button class="btn-even" onclick="join()">Beitreten</button>
    </div>

    <div id="bet-screen" class="screen">
        <h2>Wähle dein Ereignis</h2>
        <p>Worauf möchtest du tippen?</p>
        
        <button class="btn-red" onclick="placeBet('red', 'color')">Rot</button>
        <button class="btn-black" onclick="placeBet('black', 'color')">Schwarz</button>
        <button class="btn-even" onclick="placeBet('even', 'parity')">Gerade (Even)</button>
        <button class="btn-odd" onclick="placeBet('odd', 'parity')">Ungerade (Odd)</button>
        
        <hr>
        <input type="number" id="exact-number" min="0" max="12" placeholder="Zahl (0-12)">
        <button class="btn-num" onclick="placeNumberBet()">Genaue Zahl tippen</button>

        <h3 id="bet-status" style="color: #27ae60; margin-top: 20px;"></h3>
    </div>

    <div id="result-screen" class="screen">
        <h2>Das Ergebnis ist...</h2>
        <div id="result-box">?</div>
        <h3 id="win-status"></h3>
        <p>Warte auf die nächste Runde...</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myBet = null;
        let myBetType = null;
        const redNumbers = [1,3,5,7,9,11];

        function join() {
            const name = document.getElementById('student-name').value;
            if(name.trim() === "") return;
            socket.emit('join', name);
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('bet-screen').classList.add('active');
        }

        function placeBet(bet, type) {
            myBet = bet;
            myBetType = type;
            socket.emit('place_bet', { bet, type });
            document.getElementById('bet-status').innerText = `Tipp abgegeben: ${bet}`;
        }

        function placeNumberBet() {
            const num = document.getElementById('exact-number').value;
            if(num === "" || num < 0 || num > 12) return;
            placeBet(num, 'number');
        }

        socket.on('spin_result', (result) => {
            document.getElementById('bet-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            document.getElementById('result-box').innerText = result;

            let won = false;
            if (myBetType === 'number' && parseInt(myBet) === result) won = true;
            if (myBetType === 'color') {
                let isRed = redNumbers.includes(result);
                if (myBet === 'red' && isRed) won = true;
                if (myBet === 'black' && !isRed && result !== 0) won = true;
            }
            if (myBetType === 'parity' && result !== 0) {
                if (myBet === 'even' && result % 2 === 0) won = true;
                if (myBet === 'odd' && result % 2 !== 0) won = true;
            }

            const statusEl = document.getElementById('win-status');
            if (won) {
                statusEl.innerText = "Du hast GEWONNEN! 🎉";
                statusEl.style.color = "#27ae60";
            } else {
                statusEl.innerText = "Leider verloren. ❌";
                statusEl.style.color = "#e74c3c";
            }
        });

        socket.on('new_round', () => {
            myBet = null;
            myBetType = null;
            document.getElementById('bet-status').innerText = "";
            document.getElementById('exact-number').value = "";
            document.getElementById('result-screen').classList.remove('active');
            document.getElementById('bet-screen').classList.add('active');
        });
    </script>
</body>
</html>
